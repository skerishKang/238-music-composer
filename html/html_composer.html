<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>238 Music Composer - 건반으로 멜로디를 만들고 코드를 추천받자</title>
  <link rel="stylesheet" href="../css/css_main.css" />
  <link rel="stylesheet" href="../css/css_components.css" />
  <link rel="stylesheet" href="../css/css_responsive.css" />
  <link rel="stylesheet" href="../css/css_piano.css" />
  <link rel="stylesheet" href="../css/css_score.css" />
  <link rel="stylesheet" href="../css/css_composer.css" />
  <link rel="stylesheet" href="../css/css_composer_actions.css" />
  <link rel="stylesheet" href="../css/css_chord_candidates.css" />
</head>
<body class="composer-body">
  <main class="composer-shell">
    <header class="workspace-toolbar" aria-label="작곡 작업 도구">
      <div class="workspace-toolbar-left">
        <a class="back-link" href="../index.html">← 처음으로</a>
        <span class="workspace-status" id="composerStage">멜로디 → 코드 → 들어보기</span>
        <span class="workspace-save-status" id="saveStatus" data-tone="neutral" role="status">이 브라우저에 자동 저장</span>
      </div>
      <div class="workspace-toolbar-right" aria-label="주요 작업 버튼">
        <button class="workspace-button primary" type="button" id="melodyAiButton">멜로디 초안</button>
        <button class="workspace-button" type="button" id="analyzeButton">코드 추천</button>
        <button class="workspace-button" type="button" id="playButton">▶ 들어보기</button>
      </div>
    </header>

    <section class="card big-card score-card" aria-label="악보">
      <header class="score-card-header">
        <h3>멜로디</h3>
        <span class="muted" id="resultSummary">아래 피아노를 눌러 멜로디를 입력하세요.</span>
      </header>
      <div class="selected-chord-chip" id="chordStrip" aria-label="선택된 코드 진행"></div>
      <div id="melodyScore" class="vex-host"></div>
      <div class="empty-score-hint" id="emptyScoreHint" hidden>
        <p class="empty-score-title">아직 멜로디가 없습니다.</p>
        <p class="empty-score-sub">아래 피아노를 눌러 멜로디를 입력하거나,<br />상단 <strong>멜로디 초안</strong>으로 규칙 기반 2마디를 시작할 수 있어요.</p>
      </div>
    </section>

    <section class="card big-card piano-card" aria-label="피아노 건반">
      <div class="piano-frame">
        <div class="piano-octave-label" id="pianoLabel">C3 ~ B4</div>
        <div id="piano" class="piano" role="group" aria-label="가상 피아노 건반"></div>
      </div>
    </section>

    <details class="candidates-drawer" id="candidatesDrawer" hidden>
      <summary>코드 후보 <span class="candidates-meta" id="candidatesMeta"></span></summary>
      <div id="chordCandidates" class="chord-candidates" aria-label="마디별 코드 후보"></div>
    </details>

    <details class="settings" id="settingsDrawer">
      <summary>고급 설정</summary>
      <div class="settings-grid">
        <div class="control-group">
          <label for="rootSelect">조성</label>
          <select id="rootSelect">
            <option value="C">C</option>
            <option value="C#">C#</option>
            <option value="D">D</option>
            <option value="D#">D#</option>
            <option value="E">E</option>
            <option value="F">F</option>
            <option value="F#">F#</option>
            <option value="G">G</option>
            <option value="G#">G#</option>
            <option value="A">A</option>
            <option value="A#">A#</option>
            <option value="B">B</option>
          </select>
        </div>
        <div class="control-group">
          <label for="modeSelect">모드</label>
          <select id="modeSelect">
            <option value="major">장조</option>
            <option value="minor">단조</option>
          </select>
        </div>
        <div class="control-group">
          <label for="bpmInput">BPM</label>
          <input id="bpmInput" type="number" min="40" max="220" value="96" />
        </div>
        <div class="control-group">
          <label for="progressionSelect">진행</label>
          <select id="progressionSelect">
            <option value="pop">팝 I-V-vi-IV</option>
            <option value="ballad">발라드 I-VI-iii-IV</option>
            <option value="jazz">재즈 ii-V-I</option>
            <option value="minor">단조 i-VI-III-VII</option>
            <option value="emo">감성 vi-IV-I-V</option>
            <option value="loop">루프 I-vi-IV-V</option>
          </select>
        </div>
        <div class="control-group">
          <label for="patternSelect">반주</label>
          <select id="patternSelect">
            <option value="off">반주 끄기 (멜로디만)</option>
            <option value="block">블록 코드</option>
            <option value="arpeggio" selected>아르페지오</option>
            <option value="pop8">팝 8비트</option>
            <option value="waltz">발라드 3/4</option>
            <option value="funk16">펑크 16비트</option>
          </select>
        </div>
      </div>
      <div class="settings-utility" aria-label="보조 도구">
        <button class="ghost-button" type="button" id="progressionButton">코드 진행 만들기</button>
        <button class="ghost-button" type="button" id="stopButton">정지</button>
        <button class="ghost-button" type="button" id="sampleButton">예시 멜로디</button>
        <button class="ghost-button" type="button" id="projectExportButton">프로젝트 저장</button>
        <button class="ghost-button" type="button" id="projectImportButton">프로젝트 불러오기</button>
        <button class="ghost-button" type="button" id="undoButton" disabled title="되돌리기 (Ctrl/⌘ + Z)">되돌리기</button>
        <button class="ghost-button" type="button" id="redoButton" disabled title="다시 실행 (Ctrl/⌘ + Shift + Z)">다시 실행</button>
        <button class="ghost-button danger-soft" type="button" id="clearMelodyButton">전체 지우기</button>
      </div>
      <input id="projectImportInput" type="file" accept="application/json,.json" hidden />
      <details class="text-drawer">
        <summary>멜로디 텍스트 (편집 가능)</summary>
        <textarea id="melodyInput" spellcheck="false" rows="3" placeholder="예: C4:q E4:q G4:q | A4:h C5:q"></textarea>
        <p class="muted">길이 표기: q(1박) e(0.5박) h(2박) w(4박), 마디 구분은 <code>|</code></p>
      </details>
    </details>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="../js/js_app.js"></script>
  <script type="module" src="../js/js_empty_state_draft.js"></script>
  <script type="module" src="../js/js_autosave.js"></script>
  <script type="module" src="../js/js_project_file.js"></script>
  <script type="module" src="../js/js_history.js"></script>
</body>
</html>
